name: Build PyQt5 App with PyInstaller

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        # --onefile: 하나의 exe 파일로 생성
        # --noconsole: 실행 시 콘솔 창이 뜨지 않음
        # --name: 실행 파일 이름 지정
        pyinstaller --onefile --noconsole --name "HwpxMerger" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HwpxMerger-Executable
        path: dist/HwpxMerger.exe
